    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- [추가] Firebase SDK (모듈 방식) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // 🔥 중요: 본인의 Firebase 프로젝트 설정값으로 교체해야 합니다!
        // Firebase 콘솔 -> 프로젝트 설정 -> 내 앱(웹) 등록 시 나오는 config 값
        const firebaseConfig = {
            apiKey: "AIzaSyBhQfXTs8hwRkTClBlv-HXN6PUc-f60jj4", 
            authDomain: "sdg4-a5074.firebaseapp.com",
            projectId: "sdg4-a5074",
            storageBucket: "sdg4-a5074.firebasestorage.app",
            messagingSenderId: "346078526403",
            appId: "1:346078526403:web:6093f0d83a2f8bc52adb76",
            measurementId: "G-FRZW3T2YJR"
        };

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 지도 초기화 로직 (기존과 동일)
        const map = L.map('map', { zoomControl: false }).setView([20, 0], 3);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);
        L.control.zoom({ position: 'topright' }).addTo(map);

        // 글로벌 스코프로 함수 노출 (HTML onclick에서 호출하기 위함)
        window.showLogin = function() {
            const intro = document.getElementById('intro-screen');
            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.display = 'none';
                document.getElementById('login-overlay').style.display = 'flex';
            }, 500);
        };

        // 진짜 Firebase 로그인 처리 함수
        window.handleLogin = async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('login-error');
            const loginBtn = document.getElementById('login-btn');

            if(!email || !password) {
                errorMsg.innerText = "이메일과 비밀번호를 입력해주세요.";
                errorMsg.style.display = 'block';
                return;
            }

            loginBtn.innerText = "로그인 중...";
            loginBtn.disabled = true;

            try {
                // Firebase 인증 요청
                await signInWithEmailAndPassword(auth, email, password);
                
                // 로그인 성공 시 화면 전환
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('chat-container').style.display = 'block';
            } catch (error) {
                // 로그인 실패 시 에러 표시
                console.error("Login failed:", error);
                errorMsg.innerText = "로그인 실패: 계정 정보를 확인해주세요.";
                errorMsg.style.display = 'block';
                loginBtn.innerText = "로그인 및 시작";
                loginBtn.disabled = false;
            }
        };

        // 메시지 전송 로직 (기존과 동일하되 window 객체에 할당)
        window.sendMessage = async function() {
            // ... (기존 sendMessage 로직 내용 복사) ...
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim();
            const btn = document.getElementById('send-btn');
            if (!message) return;

            const chatLog = document.getElementById('chat-log');
            chatLog.innerHTML += `<div class="chat-message user">👤 나: ${message}</div>`;
            inputField.value = '';
            
            const loadingId = 'loading-' + Date.now();
            chatLog.innerHTML += `<div id="${loadingId}" class="chat-message loading">🤖 AI가 데이터를 분석 중입니다...</div>`;
            chatLog.scrollTop = chatLog.scrollHeight;
            btn.disabled = true;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                if (response.ok) {
                    chatLog.innerHTML += `<div class="chat-message ai">🤖 AI: ${data.reply}</div>`;
                    if (data.coordinates) {
                        map.flyTo(data.coordinates, 6, { animate: true, duration: 2 });
                    }
                } else {
                    chatLog.innerHTML += `<div class="chat-message ai" style="color:red;">❌ 에러: ${data.error}</div>`;
                }
            } catch (err) {
                document.getElementById(loadingId).remove();
                chatLog.innerHTML += `<div class="chat-message ai" style="color:red;">❌ 서버 통신 실패.</div>`;
            }

            btn.disabled = false;
            chatLog.scrollTop = chatLog.scrollHeight;
            inputField.focus();
        };

        window.handleEnter = function(event) {
            if (event.key === 'Enter') window.sendMessage();
        };
    </script>
</body>
</html>
