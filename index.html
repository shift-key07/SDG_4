<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduMap AI</title>
    <!-- Leaflet CSS (지도) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* 기본 리셋 및 폰트 */
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Pretendard', sans-serif; overflow: hidden; }
        
        /* 1. 홍보용 인트로(랜딩) 페이지 스타일 */
        #intro-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; z-index: 200; overflow-y: auto;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        
        .navbar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 50px; background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 210; 
            border-bottom: 1px solid #eee; 
        }
        .navbar .logo { font-size: 1.5rem; font-weight: 800; color: #2563eb; }
        .navbar .nav-links a { 
            margin-left: 30px; text-decoration: none; color: #4b5563; 
            font-weight: 600; transition: color 0.3s; 
        }
        .navbar .nav-links a:hover { color: #2563eb; }

        .hero { 
            position: relative; padding: 160px 20px; text-align: center; color: white; 
            background: url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat; 
        }
        .hero-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.75); z-index: 1; 
        }
        .hero-content { position: relative; z-index: 2; max-width: 800px; margin: 0 auto; }
        .hero h1 { font-size: 3.5rem; margin-bottom: 20px; font-weight: 800; line-height: 1.2; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .hero p { font-size: 1.2rem; margin-bottom: 40px; color: #e2e8f0; line-height: 1.6; }
        
        .start-btn {
            padding: 18px 48px; font-size: 1.2rem; background: #2563eb; color: white;
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4); transition: all 0.3s ease;
        }
        .start-btn:hover { background: #1d4ed8; transform: translateY(-3px); box-shadow: 0 15px 30px rgba(37, 99, 235, 0.6); }

        .features { padding: 100px 20px; background: #f8fafc; text-align: center; }
        .features h2 { font-size: 2.5rem; margin-bottom: 60px; color: #1e293b; font-weight: 800; }
        .feature-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; max-width: 1200px; margin: 0 auto; }
        .feature-card { 
            background: white; padding: 50px 30px; border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); transition: transform 0.3s, box-shadow 0.3s; 
        }
        .feature-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1); }
        .feature-card .icon { font-size: 3.5rem; margin-bottom: 25px; }
        .feature-card h3 { font-size: 1.5rem; margin-bottom: 15px; color: #0f172a; font-weight: 700; }
        .feature-card p { color: #64748b; line-height: 1.7; }
        
        .promo-footer { background: #0f172a; color: #94a3b8; text-align: center; padding: 40px 20px; font-size: 0.9rem; }

        /* 2. 로그인 모달 스타일 */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); z-index: 150;
            display: flex; justify-content: center; align-items: center;
        }
        .login-box {
            background: white; padding: 40px; border-radius: 12px;
            width: 300px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .login-box input {
            width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc;
            border-radius: 6px; font-size: 14px; box-sizing: border-box;
        }
        .login-box button {
            width: 100%; padding: 12px; background: #2563eb; color: white;
            border: none; border-radius: 6px; font-size: 16px; cursor: pointer;
            margin-top: 10px; transition: background 0.3s;
        }
        .login-box button:hover { background: #1d4ed8; }

        /* 3. 메인 앱 영역 (지도 & 챗봇) */
        /* 수정됨: 초기에 display: none 이었으나 화면에는 렌더링 되도록 opacity와 z-index 조절 */
        #main-app { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            opacity: 0; z-index: -1; transition: opacity 0.5s ease; 
        }
        
        #map { width: 100%; height: 100vh; z-index: 1; }

        #chat-container {
            position: absolute; bottom: 30px; right: 30px;
            width: 380px; height: 500px; background: rgba(255, 255, 255, 0.95);
            border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex; flex-direction: column; z-index: 10;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5);
        }
        .chat-header {
            padding: 15px 20px; background: #2563eb; color: white;
            border-radius: 16px 16px 0 0; font-weight: bold;
            display: flex; justify-content: space-between; align-items: center;
        }
        #chat-log {
            flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
        }
        .chat-message { padding: 12px 16px; border-radius: 12px; max-width: 80%; font-size: 0.95rem; line-height: 1.4; }
        .chat-message.user { background: #f1f5f9; color: #1e293b; align-self: flex-end; border-bottom-right-radius: 4px; }
        .chat-message.ai { background: #dbeafe; color: #1e40af; align-self: flex-start; border-bottom-left-radius: 4px; }
        .chat-message.loading { background: #e2e8f0; color: #64748b; font-style: italic; }
        
        .chat-input-area {
            display: flex; padding: 15px; border-top: 1px solid #e2e8f0; background: white; border-radius: 0 0 16px 16px;
        }
        #user-input {
            flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px;
            outline: none; font-size: 0.95rem; transition: border-color 0.2s;
        }
        #user-input:focus { border-color: #2563eb; }
        #send-btn {
            background: #2563eb; color: white; border: none; padding: 0 20px;
            margin-left: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: background 0.2s;
        }
        #send-btn:hover { background: #1d4ed8; }
        #send-btn:disabled { background: #94a3b8; cursor: not-allowed; }
    </style>
</head>
<body>

    <!-- 1. 홍보용 인트로(랜딩) 페이지 -->
    <div id="intro-screen">
        <nav class="navbar">
            <div class="logo">EduMap AI</div>
            <div class="nav-links">
                <a href="#features">소개 및 기능</a>
            </div>
        </nav>
        <section class="hero">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1>전 세계 교육의 미래를<br>데이터로 마주하다</h1>
                <p>EduMap AI는 SDG 4 데이터를 기반으로<br>전 세계 국가들의 교육 인프라 현황을 시각화하고 AI 분석을 제공합니다.</p>
                <button onclick="window.startApp()" class="start-btn">지금 바로 시작하기</button>
            </div>
        </section>
        <section id="features" class="features">
            <h2>EduMap AI 핵심 가치</h2>
            <div class="feature-grid">
                <div class="feature-card">
                    <div class="icon">🌍</div>
                    <h3>글로벌 교육 데이터</h3>
                    <p>Kaggle 데이터를 바탕으로 문맹률, 교육 예산 등을 제공합니다.</p>
                </div>
            </div>
        </section>
    </div>

    <!-- 메인 앱 래퍼 (지도와 챗봇) -->
    <div id="main-app">
        <div id="map"></div>
        
        <!-- 2. 로그인 모달 (초기엔 숨김 처리 안함, z-index로 조정) -->
        <div id="login-overlay" style="display: none;">
            <div class="login-box">
                <h2>EduMap AI</h2>
                <p>글로벌 교육 지표 탐색기</p>
                <!-- 자동완성 경고 해결: autocomplete 추가 -->
                <input type="email" id="email" placeholder="이메일 입력" autocomplete="username">
                <input type="password" id="password" placeholder="비밀번호" autocomplete="current-password">
                <button onclick="window.handleLogin()" id="login-btn">로그인 및 시작</button>
                <p id="login-error" style="color: red; font-size: 12px; margin-top: 10px; display: none;"></p>
            </div>
        </div>

        <!-- 3. 챗봇 컨테이너 (초기엔 숨김) -->
        <div id="chat-container" style="display: none;">
            <div class="chat-header">
                <span>EduMap AI Assistant</span>
            </div>
            <div id="chat-log">
                <div class="chat-message ai">🤖 안녕하세요! 궁금한 국가의 교육 현황(예: Nigeria, Ethiopia)을 영어 국가명과 함께 물어보세요!</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="user-input" placeholder="질문을 입력하세요..." onkeypress="window.handleEnter(event)">
                <button id="send-btn" onclick="window.sendMessage()">전송</button>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Firebase SDK (ES 모듈 방식 지원 브라우저용) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // 🔥 [매우 중요] Vercel 배포 시, 이 부분은 본인의 Firebase config로 꼭 교체해야 합니다!
        const firebaseConfig = {
            apiKey: "AIzaSyB-YOUR-API-KEY",
            authDomain: "your-project.firebaseapp.com",
            projectId: "your-project",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };

        let auth;
        try {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            console.log("Firebase 초기화 성공");
        } catch (e) {
            console.error("Firebase 초기화 실패 (config 값을 확인하세요):", e);
        }

        // --- 지도 초기화 수정: 페이지 로드 시 백그라운드에서 바로 그려둡니다. ---
        let map = L.map('map', { zoomControl: false }).setView([20, 0], 3);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);
        L.control.zoom({ position: 'topright' }).addTo(map);
        // 지도가 컨테이너 크기를 정확히 인식하도록 딜레이 업데이트
        setTimeout(() => { map.invalidateSize(); }, 500);

        // --- UI 제어 함수들 ---
        window.startApp = function() {
            // 인트로 숨기기
            document.getElementById('intro-screen').style.display = 'none';
            // 메인 앱 보여주기 (opacity와 z-index 변경)
            const mainApp = document.getElementById('main-app');
            mainApp.style.opacity = '1';
            mainApp.style.zIndex = '1';
            
            // 로그인 모달 띄우기
            document.getElementById('login-overlay').style.display = 'flex';
            
            // 지도가 화면에 나타난 후 크기 재계산 (Map container 에러 방지)
            map.invalidateSize();
        };

        window.handleLogin = async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('login-error');
            const loginBtn = document.getElementById('login-btn');

            if(!email || !password) {
                errorMsg.innerText = "이메일과 비밀번호를 입력해주세요.";
                errorMsg.style.display = 'block';
                return;
            }

            loginBtn.innerText = "로그인 중...";
            loginBtn.disabled = true;

            try {
                if(!auth) throw new Error("Firebase Auth가 초기화되지 않았습니다.");
                
                await signInWithEmailAndPassword(auth, email, password);
                
                // 로그인 성공
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('chat-container').style.display = 'flex';
                
            } catch (error) {
                console.error("Login failed:", error);
                errorMsg.innerText = "로그인 실패: 계정 정보나 Firebase 설정을 확인해주세요.";
                errorMsg.style.display = 'block';
                loginBtn.innerText = "로그인 및 시작";
                loginBtn.disabled = false;
            }
        };

        window.sendMessage = async function() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim();
            const btn = document.getElementById('send-btn');
            if (!message) return;

            const chatLog = document.getElementById('chat-log');
            chatLog.innerHTML += `<div class="chat-message user">👤 나: ${message}</div>`;
            inputField.value = '';
            
            const loadingId = 'loading-' + Date.now();
            chatLog.innerHTML += `<div id="${loadingId}" class="chat-message loading">🤖 AI가 SDG 4 데이터를 분석 중입니다...</div>`;
            chatLog.scrollTop = chatLog.scrollHeight;
            btn.disabled = true;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                if (response.ok) {
                    const formattedReply = data.reply.replace(/\n/g, '<br>');
                    chatLog.innerHTML += `<div class="chat-message ai">🤖 AI:<br>${formattedReply}</div>`;
                    
                    if (data.coordinates && data.coordinates[0] !== 0 && map) {
                         map.flyTo(data.coordinates, 5, { animate: true, duration: 1.5 });
                    }
                } else {
                    chatLog.innerHTML += `<div class="chat-message ai" style="color:red;">❌ 에러: ${data.error}</div>`;
                }
            } catch (err) {
                console.error("Fetch API error:", err);
                const el = document.getElementById(loadingId);
                if(el) el.remove();
                chatLog.innerHTML += `<div class="chat-message ai" style="color:red;">❌ 서버 통신 실패. Vercel 배포 상태를 확인하세요.</div>`;
            }

            btn.disabled = false;
            chatLog.scrollTop = chatLog.scrollHeight;
            inputField.focus();
        };

        window.handleEnter = function(event) {
            if (event.key === 'Enter') window.sendMessage();
        };
    </script>
</body>
</html>
